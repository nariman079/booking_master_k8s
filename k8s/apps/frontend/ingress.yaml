apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: booking-master-frontend-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: 72.56.248.210.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: booking-master-frontend-service  
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: booking-master-service  
                port:
                  number: 8000   