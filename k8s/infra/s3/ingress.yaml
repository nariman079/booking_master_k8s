apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-ingress
  annotations: 
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:
  ingressClassName: nginx
  rules:

    - host: s3.72.56.248.210.nip.io 
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio-console-service
                port:
                  number: 9001
                  
          - path: /api-s3
            pathType: Prefix
            backend:
              service:
                name: minio-api-service
                port:
                  number: 9000