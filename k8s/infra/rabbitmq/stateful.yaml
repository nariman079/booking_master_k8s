apiVersion:  apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
spec:
  serviceName: "rabbitmq-service"
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      initContainers:
      - name: fix-permiession
        image: alpine:latest
        command: ["sh", "-c", "chown -R 999:999 /data"]
        volumeMounts:
        - name: redis-data
          mountPath: /data
      containers:
      - name: rabbitmq
        image: rabbitmq:3.12-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
        envFrom:  
          - configMapRef:
              name: rabbitmq-config
          - secretRef:
              name: rabbitmq-secrets
        volumeMounts:
        - name: rabbit-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: rabbit-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi